name: Deploy schools to Amplify

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  infrastructure:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      AWS_REGION: us-east-1
      TERRAFORM_DIR: terraform
      WORKSPACE: production
      SCHOOLS: ${{ vars.SCHOOLS }}
      TF_VAR_github_access_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
      TF_VAR_secret_arn: ${{ secrets.APP_SECRETS_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} init

      - name: Select production workspace
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} workspace select $WORKSPACE || terraform -chdir=${{ env.TERRAFORM_DIR }} workspace new $WORKSPACE

      - name: Terraform plan
        run: |
          SCHOOLS_JSON=$(printf '%s' "$SCHOOLS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
          terraform -chdir=${{ env.TERRAFORM_DIR }} plan -var="schools=$SCHOOLS_JSON" -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=${{ env.TERRAFORM_DIR }} apply -auto-approve tfplan
